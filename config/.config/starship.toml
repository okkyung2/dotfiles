"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

# 오른쪽에 시간 표시 (선택)
right_format = "$time"

# 디렉토리 truncate 조정
[directory]
style = "blue"
truncation_length = 3
truncate_to_repo = true  # git repo 루트 기준으로 자름

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "​"
untracked = "​"
modified = "​"
staged = "​"
renamed = "​"
deleted = "​"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []

# Node.js 추가 (package.json 있을 때만)
[nodejs]
format = "[$symbol$version]($style) "
symbol = ""
style = "bright-black"
detect_files = ["package.json"]
detect_folders = ["node_modules"]

[time]
disabled = false
style = "dimmed"
format = "[$time]($style)"
time_format = "%H:%M"

